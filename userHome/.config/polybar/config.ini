[colors]
background = {{POLYBAR_BG}}
background-alt = #29263c
foreground = {{POLYBAR_FG}}
primary = {{POLYBAR_PRIMARY}}
alert = #ff6767
yellow = #ffca85
purple = {{POLYBAR_PURPLE}}
lpurple = {{POLYBAR_ACCENT}}
cyan = {{POLYBAR_CYAN}}
[bar/primary]
monitor = eDP-1
width = 100%
height = 20pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = {{ALACRITTY_SEPERATOR}} 

font-0 = "Iosevka Nerd Font Mono:style=Bold;4"
font-1 = "Iosevka Nerd Font Mono;4"
font-2 = "Iosevka Nerd Font Mono;5"

modules-left = xworkspaces 
modules-right = memory cpu battery wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true

label-active = %name%
label-active-background = #8029263c
label-active-overline = {{POLYBAR_PRIMARY}}
label-active-foreground = {{POLYBAR_FG}}
label-active-font = 3
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = #717197
label-occupied-font = 2
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-font = 2
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.alert}
label-empty-font = 2
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#ffca85}disk%{F-} [%percentage_used%%]

label-unmounted = %{F#ff6767}disk%{F-} [N/A]
[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume = %{F{{POLYBAR_CYAN}}}vol%{F-} [%percentage%%]

label-muted = %{F#ff6767}vol%{F-} [muted]
[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.primary}

[module/memory]
type = internal/memory
interval = 2
label = %{F{{POLYBAR_ACCENT}}}mem%{F-} [%percentage_used%%]
[module/cpu]
type = internal/cpu
interval = 2
threshold-warn = 80
label = %{F{{POLYBAR_PRIMARY}}}cpu%{F-} [%percentage:2%%]
label-warn = %{F#ff6767}cpu%{F-} [%percentage:2%%]
format-warn = <label-warn>
[network-base]
type = internal/network
interval = 1
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless 
label-connected = %{F{{POLYBAR_PRIMARY}}}wifi%{F-} [%essid%]
[module/date]
type = internal/date
interval = 1

date = %m/%d %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %{F#ffca85}time%{F-} [%date%]

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
full-at = 99
poll-interval = 5

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>

label-charging = %{F{{POLYBAR_CYAN}}}bat%{F-} [%percentage%% ‚ÜĎ]
label-discharging = %{F{{POLYBAR_PRIMARY}}}bat%{F-} [%percentage%%]
label-full = %{F{{POLYBAR_PRIMARY}}}bat%{F-} [full]
label-low = %{F#ff6767}bat%{F-} [%percentage%%]

low-at = 20
format-low = <label-low>

[bar/secondary]
monitor = HDMI-1-0
width = 100%
height = 20pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 2pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

font-0 = "Iosevka Nerd Font Mono:style=Bold;2"
font-1 = "Iosevka Nerd Font Mono;2"
font-2 = "Iosevka Nerd Font Mono;5"

modules-left = xworkspaces

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = i3

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
